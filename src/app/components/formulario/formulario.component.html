<div class="container-fluid p-4" style="background-color: #1a2a40; min-height: 100vh;">
  <div class="card mb-4 bg-light shadow-sm">
    <div class="card-body d-flex justify-content-between align-items-center py-2">
      <div class="small">
        <i class="bi bi-person-fill"></i> Sesión de: <strong>{{ usuarioLogueado.displayName }}</strong><br>
        <i class="bi bi-envelope"></i> Correo: <strong>{{ usuarioLogueado.email }}</strong><br>
        <i class="bi bi-calendar"></i> Último registro: <strong>N/A</strong>
      </div>
      <div class="text-end">
        <span class="badge bg-primary mb-2">Registros en MySQL: {{ proyectos.length }}</span><br>
        <button class="btn btn-outline-danger btn-sm" (click)="salir()">❌ SALIR</button>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-md-5">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-2">
          <h6 class="mb-0">📊 Registro de Proyectos en MySQL</h6>
        </div>
        <div class="card-body">
          <label class="small fw-bold">🚀 Nombre del Proyecto</label>
          <input type="text" [(ngModel)]="proyecto.nombre" class="form-control mb-3">
          
          <div class="row text-center">
            <div class="col-4">
              <label class="small"><i class="bi bi-clock"></i> H. Est</label>
              <input type="number" [(ngModel)]="proyecto.horasEstimadas" class="form-control">
            </div>
            <div class="col-4">
              <label class="small"><i class="bi bi-clock-history"></i> H. Real</label>
              <input type="number" [(ngModel)]="proyecto.horasReales" class="form-control">
            </div>
            <div class="col-4">
              <label class="small"><i class="bi bi-cash"></i> $/Hora</label>
              <input type="number" [(ngModel)]="proyecto.costoHora" class="form-control">
            </div>
          </div>
          
          <button (click)="guardar()" class="btn btn-success w-100 mt-4 fw-bold">
            💾 GUARDAR EN MYSQL
          </button>
        </div>
      </div>
    </div>

    <div class="col-md-7">
      <div class="card shadow border-0 mb-3" style="height: 250px; background-color: white;">
        <div id="grafica1"></div> </div>
      <div class="card shadow border-0" style="height: 250px; background-color: white;">
        <div id="grafica2"></div>
      </div>
    </div>
  </div>
</div>
