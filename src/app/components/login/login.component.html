<div class="login-container d-flex align-items-center justify-content-center vh-100 bg-dark">
  <div class="card p-4 shadow-lg text-center" style="width: 350px; border-radius: 20px;">
    
    <div class="mb-3">
      <h2 class="fw-bold"><span class="me-2">🔐</span>Acceso al Sistema</h2>
      <p class="text-muted small">Bienvenido, Pablo Cesar Zuniga</p>
    </div>

    <form (submit)="$event.preventDefault()">
      <div class="mb-3 text-start">
        <label class="form-label small fw-bold">Usuario</label>
        <input type="text" 
               name="usuario"
               [(ngModel)]="credenciales.usuario" 
               class="form-control" 
               placeholder="ejemplo@correo.com">
      </div>

      <div class="mb-4 text-start">
        <label class="form-label small fw-bold">Contraseña</label>
        <input type="password" 
               name="password"
               [(ngModel)]="credenciales.password" 
               class="form-control" 
               placeholder="****">
      </div>

      <button type="button" 
              (click)="entrar()" 
              class="btn btn-primary w-100 fw-bold py-2 shadow-sm mb-3" 
              style="border-radius: 10px;">
        ENTRAR AL DASHBOARD
      </button>

      <div class="d-flex align-items-center my-3">
        <hr class="flex-grow-1">
        <span class="mx-2 text-muted small">o</span>
        <hr class="flex-grow-1">
      </div>

      <button type="button" 
              (click)="loginConGoogle()" 
              class="btn w-100 fw-bold py-2 shadow-sm d-flex align-items-center justify-content-center" 
              style="border-radius: 10px; background-color: #db4437; color: white; border: none;">
        <div class="bg-white d-flex align-items-center justify-content-center me-2" 
             style="border-radius: 4px; width: 24px; height: 24px;">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="16">
        </div>
        ENTRAR CON GOOGLE
      </button>
    </form>
  </div>
</div>
